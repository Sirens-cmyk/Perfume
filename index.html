<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXURY PERFUME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        :root {
            --bg-dark: #0f0f1a;
            --card-dark: rgba(255,255,255,0.06);
            --gold: #eab308;
            --text-light: #ffffff;
            --text-muted: #aaa;
            --border: rgba(234, 179, 8, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Vazirmatn', sans-serif; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); color: white; min-height: 100vh; padding-bottom: 70px; }
        header { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); padding: 15px; text-align: center; border-bottom: 1px solid rgba(234, 179, 8, 0.3); }
        .logo { font-size: 24px; font-weight: 700; color: var(--gold); }
        .container { padding: 15px; }
        .card { background: var(--card-dark); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px 15px; margin-bottom: 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-family: inherit; }
        .btn { width: 100%; background: linear-gradient(90deg, var(--gold), #f59e0b); color: #0f0f1a; border: none; padding: 13px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; }
        
        /* استایل ردیفی فاکتورها */
        .invoice-item { background: rgba(0,0,0,0.3); border-right: 4px solid var(--gold); padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; display: flex; justify-content: space-between; }
        
        /* کاتالوگ عطرها */
        .top-bar { padding: 15px 0; overflow-x: auto; white-space: nowrap; margin-bottom: 15px; scrollbar-width: none; }
        .product-strip { display: flex; gap: 12px; padding: 0 15px; }
        .strip-item { width: 90px; text-align: center; }
        .strip-img { width: 75px; height: 75px; border-radius: 18px; object-fit: cover; border: 2px solid var(--gold); }
        .strip-name { font-size: 11px; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .product-card { background: var(--card-dark); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .product-img { width: 100%; height: 140px; object-fit: cover; }
        .product-info { padding: 10px; text-align: center; }
        .product-name { font-size: 13px; font-weight: 600; }
        .product-price { color: var(--gold); font-size: 13px; font-weight: 700; margin-top: 4px; }

        .quiz-option { background: rgba(255,255,255,0.05); padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; cursor: pointer; }

        .app-page { display: none; }
        #page-auth { display: block; }
    </style>
</head>
<body>

    <header><div class="logo">🪻 LUXURY PERFUME</div></header>

    <div class="container">
        <div id="page-auth" class="app-page">
            <div class="card">
                <h3>🔑 ورود به باشگاه مشتریان</h3>
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">دسترسی به ویترین تنها برای اعضای ثبت‌شده امکان‌پذیر است.</p>
                <input type="text" id="auth-name" placeholder="نام و نام خانوادگی">
                <input type="tel" id="auth-phone" placeholder="شماره همراه (مثال: 09131234567)">
                <button class="btn" onclick="verifyUser()">بررسی دسترسی و ورود</button>
            </div>
        </div>

        <div id="page-shop" class="app-page">
            <div class="card" style="background: linear-gradient(45deg, #16161e, #251f12);">
                <h4 style="color: var(--gold);">✨ عطر اختصاصی تو کدومه؟</h4>
                <button class="btn" style="margin-top: 10px; padding: 8px;" onclick="startQuiz()">تست عطرشناسی (۵ سوال)</button>
            </div>
            
            <h3 style="margin-bottom: 10px;">📊 سوابق خرید شما</h3>
            <div id="invoices-list"></div>

            <h3 style="margin: 20px 0 10px 0;">🛍️ ویترین محصولات</h3>
            <div class="top-bar"><div class="product-strip" id="strip-list"></div></div>
            <div class="products-grid" id="grid-list"></div>
        </div>

        <div id="page-quiz" class="app-page class card">
            <p id="quiz-progress" style="color: var(--gold); font-size: 12px; margin-bottom: 5px;"></p>
            <h3 id="quiz-question"></h3>
            <div id="quiz-options"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://d7f65a29d9c224.lhr.life";
            

          // آدرس سرور پایتون رو اینجا بذار هم

        async function verifyUser() {
            const phone = document.getElementById('auth-phone').value.trim();
            if(!phone) return alert("لطفاً شماره را وارد کنید");

            try {
                const response = await fetch(`${SERVER_URL}/api/shop-data?phone=${phone}`);
                const data = await response.json();
                
                if (data.status === "verified") {
                    document.getElementById('page-auth').style.display = 'none';
                    document.getElementById('page-shop').style.display = 'block';
                    renderShop(data);
                } else {
                    alert("مشخصات شما در سیستم پیدا نشد.");
                }
            } catch (e) { alert("خطا در اتصال به سرور ترموکس"); }
        }

        function renderShop(data) {
            // رندر فاکتورهای ردیفی
            const invDiv = document.getElementById('invoices-list');
            invDiv.innerHTML = data.invoices.map(i => `
                <div class="invoice-item">
                    <span>🛍️ ${i.perfume} (${i.size})</span>
                    <span style="color:var(--gold); font-weight:bold;">${i.price} تومان</span>
                </div>
            `).join('') || '<div class="invoice-item">فاکتوری ثبت نشده است.</div>';

            // رندر محصولات دیتابیس عطرها
            const grid = document.getElementById('grid-list');
            const strip = document.getElementById('strip-list');
            grid.innerHTML = ''; strip.innerHTML = '';

            data.perfumes.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-img">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${p.price} ت</div>
                        </div>
                    </div>`;
                strip.innerHTML += `
                    <div class="strip-item">
                        <img src="${p.img}" class="strip-img">
                        <div class="strip-name">${p.name}</div>
                    </div>`;
            });
        }

        // منطق ۵ سوال مسابقه
        const quizData = [
            { q: "۱. طبع عطر مورد علاقه‌ت چطور باشه؟", options: ["خنک و تابستانی", "گرم و زمستانی", "معتدل و چهارفصل"] },
            { q: "۲. کدوم گروه بویایی رو می‌پسندی؟", options: ["تلخ و چوبی/چرمی", "شیرین و گلی", "مرکباتی و ادویه‌ای"] },
            { q: "۳. عطر رو بیشتر برای چه محیطی می‌خوای؟", options: ["قرارهای رسمی", "استفاده روزمره", "مهمانی شبانه"] },
            { q: "۴. فاکتور مهم برای شما در انتخاب عطر چیه؟", options: ["پخش بوی شدید", "ماندگاری طولانی", "رایحه خاص و نیش"] },
            { q: "۵. تیپ و استایل غالب شما چطوریه؟", options: ["کلاسیک و رسمی", "اسپرت و راحت", "امروزی و فشن"] }
        ];
        let currentQ = 0;

        function startQuiz() {
            document.getElementById('page-shop').style.display = 'none';
            document.getElementById('page-quiz').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = quizData[currentQ];
            document.getElementById('quiz-progress').innerText = `سوال ${currentQ + 1} از ۵`;
            document.getElementById('quiz-question').innerText = q.q;
            const optDiv = document.getElementById('quiz-options');
            optDiv.innerHTML = '';
            q.options.forEach(o => {
                const d = document.createElement('div');
                d.className = 'quiz-option';
                d.innerText = o;
                d.onclick = () => {
                    currentQ++;
                    if(currentQ < quizData.length) showQuestion();
                    else showResult();
                };
                optDiv.appendChild(d);
            });
        }

        function showResult() {
            document.getElementById('quiz-question').innerText = "✨ عطر پیشنهادی شما:";
            document.getElementById('quiz-options').innerHTML = `
                <div style="text-align:center; padding:15px 0;">
                    <h2 style="color:var(--gold); margin-bottom:10px;">Bleu De Chanel</h2>
                    <p style="font-size:13px; color:var(--text-muted);">هماهنگی کامل با استایل و روحیات شما.</p>
                    <button class="btn" style="margin-top:20px;" onclick="location.reload()">بازگشت به فروشگاه</button>
                </div>`;
            currentQ = 0;
        }
    </script>
</body>
</html>
