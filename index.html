<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>باشگاه مشتریان عطر لوکس</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --success-color: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }

        h3, h4 { margin-top: 0; color: var(--text-main); }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #f9fafb;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: #ef4444; }

        .table-container { overflow-x: auto; margin-top: 12px; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        th { background-color: #f9fafb; font-weight: 600; }

        #auth-screen, #admin-panel, #main-content { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <h3>🔑 ورود به باشگاه مشتریان</h3>
        <p style="color: var(--text-muted); font-size: 13px;">اطلاعات خود را وارد کنید تا کاتالوگ و سوابق خرید باز شود.</p>
        <input type="text" id="auth-name" placeholder="نام و نام خانوادگی">
        <input type="tel" id="auth-phone" placeholder="شماره تلفن (مثال: 09131234567)">
        <button class="btn" onclick="requestLogin()">ورود به فروشگاه</button>
    </div>

    <div id="main-content" class="card">
        <h3>📊 سوابق خرید شما</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>عطر</th>
                        <th>حجم</th>
                        <th>قیمت (تومان)</th>
                    </tr>
                </thead>
                <tbody id="invoice-rows">
                    <tr>
                        <td colspan="3" style="text-align:center; color:var(--text-muted);">در حال بارگذاری فاکتورها...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="admin-panel" class="card" style="border-top: 4px solid var(--primary-color);">
        <h3 style="color: var(--primary-color);">👑 پنل مدیریت آقای هاشمی</h3>
        <input type="number" id="c-id" placeholder="آیدی عددی تلگرام مشتری">
        <input type="text" id="c-name" placeholder="نام و نام خانوادگی">
        <input type="tel" id="c-phone" placeholder="شماره تلفن">
        <input type="text" id="c-perfume" placeholder="نام عطر">
        <input type="text" id="c-size" placeholder="حجم عطر (مثال: 10 میل)">
        <input type="number" id="c-price" placeholder="قیمت (تومان)">
        <button class="btn" onclick="adminAction('add')">ثبت مشتری و فاکتور</button>
        <button class="btn btn-danger" style="margin-top: 8px;" onclick="adminAction('delete')">حذف کامل مشتری</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // آیدی جدید و دقیق شما
        const ADMIN_ID = 917524542; 
        const current_user_id = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;

        // بررسی آنی سطح دسترسی مدیر
        if (current_user_id === ADMIN_ID) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            document.getElementById('auth-screen').style.display = 'block';
            document.getElementById('admin-panel').style.display = 'none';
        }

        function requestLogin() {
            const name = document.getElementById('auth-name').value;
            const phone = document.getElementById('auth-phone').value;
            if(!name || !/^09\d{9}$/.test(phone)) {
                alert('مشخصات معتبر وارد کنید.');
                return;
            }
            tg.sendData(JSON.stringify({
                action: 'login_request',
                fullname: name,
                phone: phone
            }));
            tg.close();
        }

        function adminAction(mode) {
            const data = {
                action: mode === 'add' ? 'admin_add_customer' : 'admin_delete_customer',
                user_id: document.getElementById('c-id').value,
                fullname: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                perfume: document.getElementById('c-perfume').value,
                size: document.getElementById('c-size').value,
                price: document.getElementById('c-price').value
            };
            if(!data.user_id) { alert('وارد کردن آیدی عددی الزامی است.'); return; }
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
