<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه عطر</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #121212;
            --border-color: #2c2c2c;
            --gold: #d4af37;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
        }

        /* بخش فاکتور خرید (بالا) */
        .section-container {
            border: 2px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .section-title {
            position: absolute;
            top: -12px;
            right: 15px;
            background-color: var(--bg-color);
            padding: 0 10px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .invoice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .invoice-inputs, .invoice-summary {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .field-group label {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .field-group input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px;
            text-align: center;
            font-size: 13px;
        }

        /* بخش دکمه‌های عملیاتی فاکتور */
        .invoice-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* جدول لیست عطرها */
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 13px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px 5px;
        }

        th {
            background-color: var(--panel-bg);
            color: var(--text-muted);
            font-weight: normal;
        }

        .checkbox-custom {
            cursor: pointer;
            accent-color: var(--gold);
        }

        /* دکمه‌های خروجی پایین */
        .bottom-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div class="section-container">
        <div class="section-title">فاکتور خرید</div>
        <div class="invoice-grid">
            <div class="invoice-inputs">
                <div class="field-group">
                    <label>نام مشتری :</label>
                    <input type="text" id="cust-name">
                </div>
                <div class="field-group">
                    <label>شماره تلفن :</label>
                    <input type="text" id="cust-phone">
                </div>
                <div class="field-group">
                    <label>تاریخ :</label>
                    <input type="text" id="invoice-date" value="1405/04/10">
                </div>
            </div>
            <div class="invoice-summary">
                <div class="field-group">
                    <label>تعداد آیتم :</label>
                    <input type="text" readonly value="0">
                </div>
                <div class="field-group">
                    <label>جمع کل :</label>
                    <input type="text" readonly value="0">
                </div>
                <div class="field-group">
                    <label>تخفیف :</label>
                    <input type="text" readonly value="0">
                </div>
                <div class="field-group">
                    <label>قابل پرداخت :</label>
                    <input type="text" readonly value="0" style="color: var(--gold); font-weight: bold;">
                </div>
            </div>
        </div>
        <div class="invoice-actions">
            <button class="btn">حذف مورد انتخاب</button>
            <button class="btn">حذف همه</button>
            <button class="btn" style="border-color: var(--gold); color: var(--gold);">تسویه</button>
        </div>
    </div>

    <div class="section-container">
        <div class="section-title">لیست عطرها</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ردیف</th>
                        <th>نام عطر</th>
                        <th>حجم</th>
                        <th>قیمت (تومان)</th>
                        <th>موجودی</th>
                        <th>انتخاب</th>
                    </tr>
                </thead>
                <tbody id="perfume-table-body">
                    <tr>
                        <td>۱</td>
                        <td>دیور سواج</td>
                        <td>100 ml</td>
                        <td>7,900,000</td>
                        <td>12</td>
                        <td><input type="checkbox" class="checkbox-custom"></td>
                    </tr>
                    <tr>
                        <td>۲</td>
                        <td>بلو چنل</td>
                        <td>100 ml</td>
                        <td>8,200,000</td>
                        <td>8</td>
                        <td><input type="checkbox" class="checkbox-custom"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="bottom-actions">
        <button class="btn">خروج</button>
        <button class="btn">تازه سازی</button>
    </div>

</body>
</html>
