<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه عطر</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #222222; /* رنگ دودی پس‌زمینه */
            --panel-bg: #2a2a2a;
            --border-color: #f5ebe0; /* رنگ کرم روشن برای خطوط */
            --text-color: #ffffff;
            --text-muted: #e3d5ca; /* کرم ملایم برای متون فرعی */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            display: none; /* تا زمان تأیید هویت مخفی می‌مونه */
        }

        /* استایل کادربندی‌های وایرفریم */
        .section-container {
            border: 2px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .section-title {
            position: absolute;
            top: -12px;
            right: 15px;
            background-color: var(--bg-color);
            padding: 0 10px;
            font-size: 14px;
            color: var(--border-color);
        }

        .invoice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .invoice-inputs, .invoice-summary {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .field-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .field-group label {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .field-group input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px;
            text-align: center;
            font-size: 13px;
        }

        /* جدول لیست عطرها */
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 13px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 10px 5px;
        }

        th {
            background-color: var(--panel-bg);
            color: var(--border-color);
            font-weight: normal;
        }

        /* دکمه‌های پایینی */
        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--border-color);
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--border-color);
            color: var(--bg-color);
        }

        .bottom-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        #error-screen {
            display: none;
            text-align: center;
            padding: 50px 20px;
            color: #ff4d4d;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="app-content">
        <!-- بخش فاکتور خرید -->
        <div class="section-container">
            <div class="section-title">فاکتور خرید</div>
            <div class="invoice-grid">
                <div class="invoice-inputs">
                    <div class="field-group">
                        <label>نام مشتری :</label>
                        <input type="text" id="cust-name" readonly>
                    </div>
                    <div class="field-group">
                        <label>شماره تلفن :</label>
                        <input type="text" id="cust-phone" readonly>
                    </div>
                    <div class="field-group">
                        <label>تاریخ :</label>
                        <input type="text" id="invoice-date" readonly>
                    </div>
                </div>
                <div class="invoice-summary">
                    <div class="field-group">
                        <label>تعداد آیتم :</label>
                        <input type="text" id="total-items" readonly value="0">
                    </div>
                    <div class="field-group">
                        <label>جمع کل :</label>
                        <input type="text" id="total-price" readonly value="0">
                    </div>
                    <div class="field-group">
                        <label>تخفیف :</label>
                        <input type="text" id="discount" readonly value="0">
                    </div>
                    <div class="field-group">
                        <label>قابل پرداخت :</label>
                        <input type="text" id="payable" readonly value="0" style="font-weight: bold; color: var(--border-color);">
                    </div>
                </div>
            </div>
        </div>

        <!-- بخش لیست عطرها -->
        <div class="section-container">
            <div class="section-title">لیست عطرها</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ردیف</th>
                            <th>نام عطر</th>
                            <th>حجم</th>
                            <th>قیمت (تومان)</th>
                            <th>موجودی</th>
                        </tr>
                    </thead>
                    <tbody id="perfume-table-body">
                        <!-- دیتاها از بک‌اند لود می‌شوند -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- دکمه‌های پایینی -->
        <div class="bottom-actions">
            <button class="btn" onclick="closeApp()">خروج</button>
            <button class="btn" onclick="reloadData()">تازه سازی</button>
        </div>
    </div>

    <div id="error-screen">
        <h3>دسترسی غیرمجاز</h3>
        <p style="color: var(--text-muted); margin-top: 10px; font-size: 14px;">اطلاعات شما توسط ادمین ثبت نشده است. درخواست شما به مدیریت ارسال شد.</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 👇👇 آدرس لوکال‌هاست‌ران رو دقیقاً اینجا وارد کن 👇👇
        const SERVER_URL = "https://90d49247295968.lhr.life"; 

        async function checkUserAccess() {
            const user = tg.initDataUnsafe?.user;
            if (!user) {
                document.getElementById('error-screen').style.display = 'block';
                document.getElementById('error-screen').innerText = "لطفاً برنامه را از داخل تلگرام باز کنید.";
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/check-user/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegram_id: user.id,
                        username: user.username || '',
                        first_name: user.first_name || '',
                        last_name: user.last_name || ''
                    })
                });
                const data = await response.json();

                if (data.allowed) {
                    document.body.style.display = 'block';
                    loadDashboardData(data.user_info, data.perfumes);
                } else {
                    document.getElementById('error-screen').style.display = 'block';
                }
            } catch (error) {
                console.error("Error connecting to server:", error);
                document.getElementById('error-screen').style.display = 'block';
                document.getElementById('error-screen').innerText = "خطا در اتصال به سرور پایتون.";
            }
        }

        function loadDashboardData(userInfo, perfumes) {
            document.getElementById('cust-name').value = userInfo.name || '';
            document.getElementById('cust-phone').value = userInfo.phone || '';
            document.getElementById('invoice-date').value = userInfo.date || '';
            document.getElementById('total-items').value = userInfo.total_items || 0;
            document.getElementById('total-price').value = userInfo.total_price || 0;
            document.getElementById('discount').value = userInfo.discount || 0;
            document.getElementById('payable').value = userInfo.payable || 0;

            const tbody = document.getElementById('perfume-table-body');
            tbody.innerHTML = '';
            perfumes.forEach((item, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td>${item.size}</td>
                        <td>${item.price}</td>
                        <td>${item.stock}</td>
                    </tr>
                `;
            });
        }

        function reloadData() {
            checkUserAccess();
        }

        function closeApp() {
            tg.close();
        }

        window.onload = checkUserAccess;
    </script>
</body>
</html>
