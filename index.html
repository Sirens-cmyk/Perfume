<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Perfume House</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f12;
            --card-dark: #16161e;
            --gold: #d4af37;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #262633;
            --danger: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .header h1 { font-size: 22px; color: var(--gold); margin: 0; letter-spacing: 1px; cursor: pointer; }
        .header p { font-size: 12px; color: var(--text-muted); margin: 4px 0 0 0; }

        .card {
            background: var(--card-dark);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        h3, h4 { color: var(--gold); margin-top: 0; font-size: 16px; margin-bottom: 12px; }
        h4 { color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-top: 15px;}

        input, select {
            width: 100%;
            padding: 12px 16px;
            margin: 6px 0 14px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #1a1a24;
            color: var(--text-light);
            font-size: 14px;
        }
        input:focus { outline: none; border-color: var(--gold); }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #b89028);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #b91c1c); color: #fff; }
        .btn-secondary { background: transparent; color: var(--gold); border: 1px solid var(--gold); }

        .invoice-list { display: flex; flex-direction: column; gap: 10px; }
        .invoice-item {
            background: #1a1a24;
            padding: 12px 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 3px solid var(--gold);
        }
        .invoice-name { font-weight: bold; font-size: 14px; }

        .perfume-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .perfume-card {
            background: var(--card-dark);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .perfume-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; }
        .perfume-title { font-size: 13px; font-weight: bold; margin: 8px 0 4px 0; }
        .perfume-price { color: var(--gold); font-size: 13px; font-weight: bold; }

        .quiz-option {
            background: #1a1a24;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        /* حالت اولیه قفل صفحه */
        #auth-screen { display: block; }
        #main-shop, #admin-panel, #quiz-screen { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1 onclick="triggerAdminCheck()">LUXURY PERFUME</h1>
        <p>خانه عطر مجلل</p>
    </div>

    <div id="auth-screen" class="card">
        <h3>🔑 احراز هویت باشگاه مشتریان</h3>
        <p style="color: var(--text-muted); font-size: 13px;">لطفاً مشخصات خود را جهت انطباق با لیست اعضا وارد کنید:</p>
        <input type="text" id="auth-name" placeholder="نام و نام خانوادگی">
        <input type="tel" id="auth-phone" placeholder="شماره تلفن (مثال: 09131234567)">
        <button class="btn" onclick="requestLogin()">بررسی و ورود به فروشگاه</button>
    </div>

    <div id="main-shop">
        <div class="card" style="background: linear-gradient(45deg, #16161e, #251f12); border: 1px solid var(--gold);">
            <h3>✨ عطر اختصاصی تو کدومه؟</h3>
            <button class="btn" onclick="startQuiz()">شروع تست عطر شناسی (۵ سوال)</button>
        </div>

        <h3>📊 سوابق خرید شما</h3>
        <div class="invoice-list" id="invoice-rows"></div>

        <h3 style="margin-top: 24px;">🛍️ ویترین عطرهای برتر</h3>
        <div class="perfume-grid" id="perfume-list"></div>
    </div>

    <div id="quiz-screen" class="card">
        <p id="quiz-progress" style="font-size: 11px; color: var(--gold); margin: 0 0 6px 0;"></p>
        <h3 id="quiz-question">سوال</h3>
        <div id="quiz-options"></div>
    </div>

    <div id="admin-panel" class="card" style="border-top: 4px solid var(--gold);">
        <h3>👑 پنل مدیریت همه‌جانبه</h3>
        
        <h4>👥 مدیریت مشتریان (حذف و اضافه)</h4>
        <input type="number" id="c-id" placeholder="آیدی عددی تلگرام مشتری">
        <input type="text" id="c-name" placeholder="نام و نام خانوادگی">
        <input type="tel" id="c-phone" placeholder="شماره تلفن">
        <input type="text" id="c-perfume" placeholder="نام عطر خریداری شده">
        <input type="text" id="c-size" placeholder="حجم عطر (مثال: 10 میل)">
        <input type="number" id="c-price" placeholder="قیمت فاکتور (تومان)">
        <button class="btn" onclick="adminAction('admin_add_customer')">➕ ثبت مشتری و فاکتور خرید</button>
        <button class="btn btn-danger" onclick="adminAction('admin_delete_customer')">🗑️ حذف کامل مشتری و سوابق</button>
        
        <h4>🧪 مدیریت کاتالوگ عطرها (حذف و اضافه)</h4>
        <input type="text" id="p-name" placeholder="نام انگلیسی عطر">
        <input type="text" id="p-brand" placeholder="برند عطر (فارسی/انگلیسی)">
        <input type="text" id="p-price" placeholder="قیمت عطر (مثال: موجود / ۴۵۰,۰۰۰)">
        <input type="text" id="p-img" placeholder="لینک عکس عطر">
        <button class="btn" style="background: linear-gradient(135deg, #10b981, #059669); color:#000;" onclick="adminAction('admin_add_perfume')">✨ افزودن عطر به ویترین</button>
        <button class="btn btn-danger" onclick="adminAction('admin_delete_perfume')">❌ حذف عطر از کاتالوگ</button>

        <button class="btn btn-secondary" style="margin-top: 20px;" onclick="document.getElementById('admin-panel').style.display='none'; document.getElementById('main-shop').style.display='block';">خروج از پنل مدیریت</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let clickCount = 0;
        function triggerAdminCheck() {
            clickCount++;
            if (clickCount >= 5) {
                clickCount = 0;
                const password = prompt("رمز عبور مدیر را وارد کنید:");
                if (password === "1234") {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-shop').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'block';
                } else { alert("رمز اشتباه است!"); }
            }
        }

        // ارتباط با بک‌اند برای گرفتن اطلاعات واقعی عطرها و فاکتورها بعد از تایید پایتون
        window.addEventListener('message', function(event) {
            try {
                const res = JSON.parse(event.data);
                if (res.status === "verified") {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('main-shop').style.display = 'block';
                    
                    // رندر فاکتورها
                    const invDiv = document.getElementById('invoice-rows');
                    invDiv.innerHTML = res.invoices.map(i => `
                        <div class="invoice-item">
                            <div class="invoice-details">
                                <span class="invoice-name">🛍️ ${i.perfume} (${i.size})</span>
                            </div>
                            <span class="invoice-price">${i.price} تومان</span>
                        </div>
                    `).join('') || '<div class="invoice-item">هنوز فاکتوری ندارید</div>';

                    // رندر عطرها
                    const perfDiv = document.getElementById('perfume-list');
                    perfDiv.innerHTML = res.perfumes.map(p => `
                        <div class="perfume-card">
                            <img src="${p.img || 'https://images.unsplash.com/photo-1541643600914-78b084683601?w=400'}" alt="${p.name}">
                            <div class="perfume-title">${p.name}</div>
                            <div class="perfume-price">${p.price}</div>
                        </div>
                    `).join('');
                } else if(res.status === "failed") {
                    alert("مشخصات شما در سیستم پیدا نشد. لطفا با ادمین هماهنگ کنید.");
                }
            } catch(e) {}
        });

        // ۵ سوال مسابقه عطرشناسی
        const quizData = [
            { q: "۱. طبع عطر مورد علاقه‌ت چطور باشه؟", options: ["خنک و تازه (تابستانی)", "گرم و عمیق (زمستانی)", "معتدل و چهارفصل"] },
            { q: "۲. کدوم گروه بویایی رو می‌پسندی؟", options: ["تلخ و چوبی/چرمی", "شیرین و گلی/میوه‌ای", "مرکباتی و تند ادویه‌ای"] },
            { q: "۳. عطر رو بیشتر برای چه محیطی استفاده می‌کنی؟", options: ["قرارهای رسمی و بیزینسی", "استفاده روزمره و دانشگاه", "مهمانی‌های شبانه"] },
            { q: "۴. فاکتور مهم برای شما در انتخاب عطر چیه؟", options: ["پخش بوی بسیار شدید", "ماندگاری طولانی", "رایحه خاص و منحصربه‌فرد"] },
            { q: "۵. تیپ و استایل غالب شما چطوریه? ", options: ["کلاسیک و رسمی", "اسپرت و راحت", "امروزی و فشن"] }
        ];
        let currentQuestionIndex = 0;

        function startQuiz() {
            document.getElementById('main-shop').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const currentQ = quizData[currentQuestionIndex];
            document.getElementById('quiz-progress').innerText = `سوال ${currentQuestionIndex + 1} از ۵`;
            document.getElementById('quiz-question').innerText = currentQ.q;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = "";
            currentQ.options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerText = opt;
                div.onclick = () => nextQuestion();
                optionsDiv.appendChild(div);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) { showQuestion(); } 
            else {
                document.getElementById('quiz-options').innerHTML = `
                    <div style="text-align:center;">
                        <h2 style="color:var(--gold);">Bleu De Chanel</h2>
                        <button class="btn" onclick="location.reload()">بازگشت</button>
                    </div>`;
                currentQuestionIndex = 0;
            }
        }

        function requestLogin() {
            tg.sendData(JSON.stringify({
                action: 'login_request',
                fullname: document.getElementById('auth-name').value,
                phone: document.getElementById('auth-phone').value
            }));
        }

        function adminAction(actionName) {
            tg.sendData(JSON.stringify({
                action: actionName,
                user_id: document.getElementById('c-id').value,
                fullname: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                perfume: document.getElementById('c-perfume').value,
                size: document.getElementById('c-size').value,
                price: document.getElementById('c-price').value,
                p_name: document.getElementById('p-name').value,
                p_brand: document.getElementById('p-brand').value,
                p_price: document.getElementById('p-price').value,
                p_img: document.getElementById('p-img').value
            }));
            alert("دستور با موفقیت به سرور ارسال شد.");
        }
    </script>
</body>
</html>
