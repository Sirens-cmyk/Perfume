<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه عطر</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 15px; color: #333; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 16px; font-weight: bold; }
        select, input { width: 100%; padding: 10px; margin: 5px 0 15px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        img { max-width: 120px; border-radius: 5px; display: block; margin: 0 auto; }
        h2 { font-size: 18px; margin: 10px 0; text-align: center; }
        .price { color: green; font-weight: bold; text-align: center; }
        #admin-panel { display: none; background: #ffe6e6; border: 2px dashed #ff4d4d; }
    </style>
</head>
<body>

    <div class="card" id="admin-panel">
        <h3 style="color: #cc0000; text-align: center;">🛠 پنل مدیریت عطر و مشتریان</h3>
        
        <h4>➕ افزودن عطر جدید</h4>
        <input type="text" id="p-name" placeholder="نام عطر">
        <input type="text" id="p-brand" placeholder="برند عطر">
        <select id="p-temp"><option value="گرم">گرم</option><option value="خنک">خنک</option><option value="معتدل">معتدal</option></select>
        <select id="p-scent"><option value="تلخ">تلخ</option><option value="شیرین">شیرین</option><option value="ملایم">ملایم</option></select>
        <select id="p-job"><option value="کارمند">کارمند</option><option value="دانشجو">دانشجو</option><option value="پزشک/مهندس">پزشک/مهندس</option></select>
        <input type="text" id="p-price" placeholder="قیمت (مثلا ۴,۵۰۰,۰۰۰ تومان)">
        <button class="btn" style="background: #cc0000;" onclick="addPerfume()">ثبت عطر جدید</button>
        
        <hr style="margin: 20px 0;">
        
        <h4>👤 ثبت خرید/مشتری جدید</h4>
        <input type="text" id="c-name" placeholder="نام مشتری">
        <input type="number" id="c-id" placeholder="آیدی عددی تلگرام مشتری">
        <input type="number" id="c-amount" placeholder="مبلغ خرید به تومان (مثلا ۲۵۰۰۰۰۰)">
        <button class="btn" style="background: #cc0000;" onclick="addCustomer()">ثبت خرید مشتری</button>
    </div>

    <div class="card">
        <h3 style="text-align: center;">🕵️ چه عطری به من میاد؟</h3>
        <label>طبع مورد علاقه:</label>
        <select id="f-temp"><option value="همه">همه طبع‌ها</option><option value="گرم">گرم</option><option value="خنک">خنک</option><option value="معتدل">معتدل</option></select>
        <label>رایحه مورد علاقه:</label>
        <select id="f-scent"><option value="همه">همه رایحه‌ها</option><option value="تلخ">تلخ</option><option value="شیرین">شیرین</option><option value="ملایم">ملایم</option></select>
        <label>شغل یا محیط استفاده:</label>
        <select id="f-job"><option value="همه">همه فضاها</option><option value="کارمند">کارمند</option><option value="دانشجو">دانشجو</option><option value="پزشک/مهندس">پزشک/مهندس</option></select>
        <button class="btn" onclick="filterPerfumes()">اعمال فیلتر هوشمند</button>
    </div>

    <div id="perfume-list"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // تایید هویت ادمین (آیدی عددی خودت)
        const ADMIN_ID = 1792938046; 
        if (tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === ADMIN_ID) {
            document.getElementById('admin-panel').style.display = 'block';
        }

        let allPerfumes = [];

        // لود کردن عطرها از فایل JSON
        fetch('perfumes.json')
            .then(res => res.json())
            .then(data => {
                allPerfumes = data;
                renderList(allPerfumes);
            }).catch(err => console.error("Error loading perfumes:", err));

        function renderList(perfumes) {
            const listDiv = document.getElementById('perfume-list');
            listDiv.innerHTML = '';
            if(perfumes.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center;">عطری با این مشخصات پیدا نشد! 🙁</p>';
                return;
            }
            perfumes.forEach(p => {
                listDiv.innerHTML += `
                    <div class="card">
                        <img src="${p.image}" alt="${p.name}">
                        <h2>${p.name} (${p.brand})</h2>
                        <p style="text-align:center; color:#666;">مناسب برای: ${p.temp} | ${p.scent} | ${p.job}</p>
                        <p class="price">${p.price}</p>
                        <button class="btn" style="background:#28a745;" onclick="sendOrder('${p.name}')">🛒 سفارش این عطر</button>
                    </div>
                `;
            });
        }

        function filterPerfumes() {
            const temp = document.getElementById('f-temp').value;
            const scent = document.getElementById('f-scent').value;
            const job = document.getElementById('f-job').value;

            const filtered = allPerfumes.filter(p => {
                return (temp === 'همه' || p.temp === temp) &&
                       (scent === 'همه' || p.scent === scent) &&
                       (job === 'همه' || p.job === job);
            });
            renderList(filtered);
        }

        function sendOrder(name) {
            tg.sendData(JSON.stringify({action: "order", item: name}));
        }

        function addPerfume() {
            const data = {
                action: "add_perfume",
                name: document.getElementById('p-name').value,
                brand: document.getElementById('p-brand').value,
                temp: document.getElementById('p-temp').value,
                scent: document.getElementById('p-scent').value,
                job: document.getElementById('p-job').value,
                price: document.getElementById('p-price').value
            };
            tg.sendData(JSON.stringify(data));
        }

        function addCustomer() {
            const data = {
                action: "add_customer",
                name: document.getElementById('c-name').value,
                chat_id: parseInt(document.getElementById('c-id').value),
                amount: parseInt(document.getElementById('c-amount').value)
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
